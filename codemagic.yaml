workflows:
  ios-appstore:
    name: ConsistentUs iOS App Store
    max_build_duration: 60
    environment:
      flutter: 3.44.3
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.consistentus.mindful
      vars:
        BUNDLE_ID: com.consistentus.mindful
      groups:
        - apple
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Update iOS pods
        script: |
          cd ios
          pod update FirebaseCore FirebaseAuth FirebaseMessaging FirebaseCrashlytics
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.1.2 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1))
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        apple_id: $APPLE_ID
        password: $APP_SPECIFIC_PASSWORD
